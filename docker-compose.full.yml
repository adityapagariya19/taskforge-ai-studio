# Use this version on a server (e.g. the Oracle Always-Free VM from the
# Implementation Guide) to run literally everything in containers,
# including the backend itself. Requires backend/Dockerfile (provided).
version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: taskforge_dev
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge_dev_pw
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    volumes: ["ollamadata:/root/.ollama"]

  backend:
    build: ./taskforge-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskforge_dev
      TASKFORGE_OLLAMA_BASE_URL: http://ollama:11434
      TASKFORGE_JWT_SECRET: change-me-in-production-32-chars-minimum
    ports: ["8080:8080"]

volumes:
  pgdata:
  ollamadata:
