spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${TASKFORGE_SMTP_HOST:}
    port: ${TASKFORGE_SMTP_PORT:587}
    username: ${TASKFORGE_SMTP_USERNAME:}
    password: ${TASKFORGE_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}

taskforge:
  jwt:
    # No default — production must set this explicitly. A missing env var
    # fails startup loudly instead of silently running with a known/dev secret.
    secret: ${TASKFORGE_JWT_SECRET}
    access-token-minutes: ${TASKFORGE_JWT_ACCESS_MINUTES:60}
  email:
    enabled: ${TASKFORGE_EMAIL_ENABLED:false}
    from: ${TASKFORGE_EMAIL_FROM:noreply@taskforge.local}
  ai:
    provider: ${TASKFORGE_AI_PROVIDER:cloud}
    cloud:
      base-url: ${TASKFORGE_AI_CLOUD_BASE_URL:}
      api-key: ${TASKFORGE_AI_CLOUD_API_KEY:}
      model: ${TASKFORGE_AI_CLOUD_MODEL:}
      provider-label: ${TASKFORGE_AI_CLOUD_PROVIDER_LABEL:cloud provider}
  ollama:
    base-url: ${TASKFORGE_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${TASKFORGE_OLLAMA_MODEL:llama3.1:8b}
  cors:
    allowed-origins: ${TASKFORGE_CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    enabled: ${TASKFORGE_SWAGGER_ENABLED:false}

logging:
  level:
    root: INFO
    com.taskforge: INFO
